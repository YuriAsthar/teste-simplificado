name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality Checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo_pgsql, pgsql, redis
          tools: composer:v2

      - name: Copy CI environment
        run: cp .env.ci .env

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run linter
        run: composer lint

      - name: Run static analysis
        run: composer stan

      - name: Run Rector dry-run
        run: composer rector -- --dry-run

      - name: Run PHPMD
        run: composer phpmd

  build-test:
    name: Build & Test (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app

    strategy:
      fail-fast: false
      matrix:
        php: ['8.4']
        include:
          - php: '8.5'
            experimental: true

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: wallet_testing
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d wallet_testing"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    continue-on-error: ${{ matrix.experimental || false }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: pdo_pgsql, pgsql, redis
          tools: composer:v2

      - name: Copy CI environment
        run: cp .env.ci .env

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Generate application key
        run: php artisan key:generate

      - name: Run migrations
        run: php artisan migrate:fresh --no-interaction --force

      - name: Run tests
        run: composer test
