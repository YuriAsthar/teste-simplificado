name: CI

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

jobs:
  phpmd:
    name: PHPMD
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run PHPMD
        continue-on-error: true
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/project \
            -w /project \
            jakzal/phpqa:php8.4 \
            phpmd app text cleancode,codesize,controversial,design,naming,unusedcode
