services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        UID: "${UID:-1000}"
        GID: "${GID:-1000}"
    container_name: wallet-app
    user: "${UID:-1000}:${GID:-1000}"
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    networks:
      - backend
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      rabbitmq:
        condition: service_started
      kafka:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -s -o /dev/null http://127.0.0.1:8000 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    command: ["php", "artisan", "serve", "--host=0.0.0.0", "--port=8000"]
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=sandbox
      - APP_DEBUG=true
      - QUEUE_CONNECTION=rabbitmq
      - CACHE_STORE=redis
      - REDIS_HOST=redis
      - RABBITMQ_HOST=rabbitmq
      - KAFKA_BROKERS=kafka:9092

  db:
    image: postgres:16
    container_name: wallet-db
    environment:
      POSTGRES_USER: wallet_user
      POSTGRES_PASSWORD: wallet_password
      POSTGRES_DB: wallet_sandbox
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init-multi-db.sql:/docker-entrypoint-initdb.d/init-multi-db.sql
    ports:
      - "6432:5432"
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wallet_user -d wallet_sandbox"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: wallet-redis
    ports:
      - "7379:6379"
    networks:
      - backend

  rabbitmq:
    image: rabbitmq:3-management
    container_name: wallet-rabbitmq
    ports:
      - "6672:5672"
      - "16672:15672"
    networks:
      - backend

  kafka:
    image: confluentinc/cp-kafka:7.7.1
    container_name: wallet-kafka
    ports:
      - "10092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    networks:
      - backend

  queue:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        UID: "${UID:-1000}"
        GID: "${GID:-1000}"
    container_name: wallet-queue
    user: "${UID:-1000}:${GID:-1000}"
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    networks:
      - backend
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      rabbitmq:
        condition: service_started
      kafka:
        condition: service_started
    restart: unless-stopped
    command: ["php", "artisan", "queue:work", "rabbitmq", "--max-time=3600", "--sleep=3", "--tries=3"]
    environment:
      - APP_ENV=sandbox
      - APP_DEBUG=true
      - QUEUE_CONNECTION=rabbitmq
      - CACHE_STORE=redis
      - REDIS_HOST=redis
      - RABBITMQ_HOST=rabbitmq
      - KAFKA_BROKERS=kafka:9092

volumes:
  postgres_data:

networks:
  backend:
    driver: bridge
