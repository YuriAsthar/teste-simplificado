services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wallet-app
    working_dir: /var/www/html
    volumes:
      - ./app:/var/www/html
    networks:
      - backend
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      rabbitmq:
        condition: service_started
    environment:
      - APP_ENV=sandbox
      - APP_DEBUG=true

  web:
    image: nginx:alpine
    container_name: wallet-web
    ports:
      - "8080:80"
    volumes:
      - ./app:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - backend
    depends_on:
      - app

  db:
    image: postgres:16
    container_name: wallet-db
    environment:
      POSTGRES_USER: wallet_user
      POSTGRES_PASSWORD: wallet_password
      POSTGRES_DB: wallet_sandbox
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init-multi-db.sql:/docker-entrypoint-initdb.d/init-multi-db.sql
    ports:
      - "6432:5432"
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wallet_user -d wallet_sandbox"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: wallet-redis
    ports:
      - "7379:6379"
    networks:
      - backend

  rabbitmq:
    image: rabbitmq:3-management
    container_name: wallet-rabbitmq
    ports:
      - "6672:5672"
      - "16672:15672"
    networks:
      - backend

  kafka:
    image: confluentinc/cp-kafka:7.7.1
    container_name: wallet-kafka
    ports:
      - "10092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    networks:
      - backend

volumes:
  postgres_data:

networks:
  backend:
    driver: bridge
